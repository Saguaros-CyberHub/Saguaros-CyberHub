---
- name: Create ideal Linux Kali Proxmox base template
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install updates on Kali
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
      tags: always

    # ----- Install required packages -----
    - name: Install QEMU Guest Agent, Cloud-Init, and Unattended Upgrades on Kali
      ansible.builtin.apt:
        name:
          - cloud-init
          - cloud-guest-utils
          - qemu-guest-agent
          - unattended-upgrades
          - kali-linux-large
          - kali-tools-web
          - kali-tools-passwords
          - bloodhound
          - neo4j
          - crackmapexec
          - kali-tools-reverse-engineering
          - kali-tools-detect
          - kali-tools-respond
          - kali-tools-recover
          - kali-tools-forensics
          - jq
          - golang
          - rustc
          - openssh-server
          - xrdp
          - xorgxrdp
          - kali-desktop-xfce
          - dbus-x11
        state: present
      tags: always

    - name: Enable QEMU Guest Agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: yes
      tags: always

    # PURPOSEFULLY NOT ENABLING UFW FOR ATTACK BOX TEMPLATE - USER CAN ENABLE POST-CLONE IF DESIRED
    # ----- Firewall (UFW) -----
    # - name: Allow SSH from Trusted subnets
    #   ansible.builtin.ufw:
    #     rule: allow
    #     proto: tcp
    #     from_ip:
    #       - 100.100.10.0/24 # Management VLAN
    #       - 100.100.30.0/24 # Trusted VLAN
    #       - 10.0.254.0/24 # Admin VPN range
    #       - 10.1.0.0/16 # Student VPN range
    #     port: "22"
    #   tags: always

    # - name: Enable UFW firewall
    #   ansible.builtin.ufw:
    #     state: enabled
    #   tags: always

    # ----- Timezone -----
    - name: Check the current timezone
      ansible.builtin.command: timedatectl
      register: timezone_output
      changed_when: false
      tags: always

    - name: Set timezone to America/Phoenix
      ansible.builtin.command: timedatectl set-timezone America/Phoenix
      when: "'America/Phoenix' not in timezone_output.stdout"
      tags: always

    # ----- SSH hardening -----
    - name: Configure SSHD (no root login, no password auth)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        create: yes
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 9' }
      tags: always

    - name: Ensure PasswordAuthentication is set to no # cloud-init ssh drop-in
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config.d/50-cloud-init.conf
        regexp: '^PasswordAuthentication\s+yes'
        line: 'PasswordAuthentication no'
        backup: yes
      tags: always
      ignore_errors: yes

    - name: Disable cloud-init SSH overrides  # keeps hardening consistent
      ansible.builtin.copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-ssh.cfg
        owner: root
        group: root
        mode: "0644"
        content: |
          ssh_pwauth: false
          disable_root: true
      tags: always

    # ----- Unattended upgrades -----
    - name: Configure unattended-upgrades settings
      ansible.builtin.lineinfile:
        path: /etc/apt/apt.conf.d/20auto-upgrades
        regexp: '^{{ item.regexp }}'
        line: '{{ item.line }}'
        state: present
      loop:
        - { regexp: 'APT::Periodic::Update-Package-Lists', line: 'APT::Periodic::Update-Package-Lists "1";' }
        - { regexp: 'APT::Periodic::Unattended-Upgrade', line: 'APT::Periodic::Unattended-Upgrade "1";' }
        - { regexp: 'APT::Periodic::Download-Upgradeable-Packages', line: 'APT::Periodic::Download-Upgradeable-Packages "1";' }
        - { regexp: 'APT::Periodic::AutocleanInterval', line: 'APT::Periodic::AutocleanInterval "7";' }
      tags: always

    # ----- Ensure SSH service is enabled -----
    - name: Ensure SSH service is enabled
      ansible.builtin.systemd:
        name: ssh
        enabled: yes
      tags: always

    # ----- Configure xrdp startwm.sh for Guacamole compatibility -----
    - name: Ensure xrdp can read its cert key # common requirement for SSL/TLS support
      user:
        name: xrdp
        groups: ssl-cert
        append: true
      tags: always

    - name: Force XFCE via system-wide XRDP startwm.sh
      copy:
        dest: /etc/xrdp/startwm.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/sh
          [ -r /etc/profile ] && . /etc/profile
          [ -r ~/.profile ] && . ~/.profile
          unset DBUS_SESSION_BUS_ADDRESS
          unset XDG_RUNTIME_DIR
          export DESKTOP_SESSION=xfce
          export XDG_SESSION_DESKTOP=xfce
          export XDG_CURRENT_DESKTOP=XFCE
          exec dbus-launch --exit-with-session startxfce4
      tags: always

    - name: Default session for NEW users # copied on account creation
      copy:
        dest: /etc/skel/.xsession
        owner: root
        group: root
        mode: "0644"
        content: "startxfce4\n"

    - name: Enable xrdp services
      systemd:
        name: "{{ item }}"
        enabled: true
      loop:
        - xrdp
        - xrdp-sesman

    # ----- Validate SSH configuration -----
    - name: Test SSHD configuration syntax
      ansible.builtin.command: sshd -t
      changed_when: false
      tags: always

    # ----- Reboot to apply kernel/initramfs + service changes -----
    - name: Reboot system
      ansible.builtin.reboot:
        msg: "Reboot initialized by Ansible playbook..."
        reboot_timeout: 900
      tags: always

    # ----- Template cleanup (runs after reboot) -----
    - name: Find SSH host keys
      ansible.builtin.find:
        paths: /etc/ssh
        patterns: "ssh_host_*"
      register: ssh_keys
      tags: always

    - name: Remove SSH host keys # regenerated on clone/boot
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ ssh_keys.files }}"
      tags: always

    - name: Remove root authorized_keys # optional - safer for generic template
      ansible.builtin.file:
        path: /root/.ssh/authorized_keys
        state: absent
      tags: always
      ignore_errors: yes

    - name: Remove udev persistent net rules # prevents clone NIC weirdness
      ansible.builtin.file:
        path: /etc/udev/rules.d/70-persistent-net.rules
        state: absent
      tags: always
      ignore_errors: yes

    # ----- Delete machine-id and recreate symbolic link if needed -----
    - name: Truncate /etc/machine-id to zero length
      ansible.builtin.copy:
        content: ""
        dest: /etc/machine-id
        owner: root
        group: root
        mode: "0644"
      tags: always

    - name: Recreate /var/lib/dbus/machine-id symlink
      ansible.builtin.file:
        src: /etc/machine-id
        dest: /var/lib/dbus/machine-id
        state: link
      tags: always
      ignore_errors: yes

    # ----- Clean apt database, orphan packages, and cloud-init state -----
    - name: Clean the apt database
      ansible.builtin.command: apt clean
      tags: always

    - name: Remove orphan packages
      ansible.builtin.apt:
        autoremove: yes
        purge: yes
      tags: always

    - name: Clean cloud-init state # so clones re-run properly
      ansible.builtin.command: cloud-init clean --logs --seed
      tags: always

    # ----- Shutdown the system (so you can convert to template in Proxmox) -----
    - name: Shutdown the system
      ansible.builtin.command: poweroff
      async: 1
      poll: 0
      tags: always